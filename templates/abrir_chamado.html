<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Abrir Chamado</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>

    <main class="container">

        <nav>
            <ul>
                <li>
                    <a href="/" role="button">
                        Home
                    </a>
                </li>

                <li>
                    <a href="/fila" role="button" class="secondary">
                        Fila de Suporte
                    </a>
                </li>
            </ul>
        </nav>
        <form action="/novo" method="POST">
            <h1>Novo Chamado</h1>


            <label>
                Cliente
                <input type="text" name="cliente" required>
            </label>

            <label>
                Descrição do Problema
                <textarea name="descricao" required>
            </textarea>
            </label>

            <label>
                Prioridade
                <select name="prioridade">
                    <option>Baixa</option>
                    <option>Média</option>
                    <option>Alta</option>
                </select>
            </label>

            <button type="submit">
                Abrir Chamado
            </button>

        </form>

    </main>

</body>

</html>
